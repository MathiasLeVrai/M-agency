<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <title>Page introuvable — M AGENCY</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .page-simple{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center;background:var(--dark);color:var(--warm-white)}
    .page-simple h1{font-family:var(--font-display);font-size:clamp(2rem,5vw,3rem);font-weight:300;color:var(--gold);margin-bottom:.5rem}
    .page-simple p{font-size:.85rem;color:rgba(255,255,255,.55);margin-bottom:2rem}
    .page-simple a{display:inline-block;font-size:.65rem;font-weight:600;letter-spacing:.18em;text-transform:uppercase;padding:1rem 2rem;background:var(--gold);color:var(--warm-white);text-decoration:none}
    .page-simple a:hover{background:var(--gold-light)}
  </style>
</head>
<body>
  <div class="page-simple">
    <h1>404</h1>
    <p>Cette page n’existe pas ou a été déplacée.</p>
    <a href="index.html">Retour à l’accueil</a>
  </div>
</body>
</html>
